<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Velvet Order HUD</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap');

    body, html {
        margin: 0;
        padding: 0;
        width: 920px;     /* Increased width */
        height: 680px;    /* Increased height */
        background: #0c0614;
        overflow: hidden;
        font-family: 'Cinzel', serif;
    }

    .hud {
        width: 920px;
        height: 680px;
        background: linear-gradient(#1a0f24, #0c0614);
        border: 20px solid #3d2a1f;
        box-shadow: 0 0 70px #8b00ff inset, 0 0 40px #ffd700;
        position: relative;
    }

    .header {
        text-align: center;
        padding: 20px 0 12px;
        background: linear-gradient(#2a1a3d, #1a0f24);
        border-bottom: 6px solid #ffd700;
    }

    .title {
        font-size: 54px;
        color: #ffd700;
        text-shadow: 0 0 25px #ffd700;
        letter-spacing: 8px;
        margin: 0;
    }

    .subtitle {
        font-size: 16px;
        color: #b89778;
    }

    /* Center Emblem */
    .center-emblem {
        position: absolute;
        top: 110px;
        left: 50%;
        transform: translateX(-50%);
        width: 220px;
        height: 220px;
        background: radial-gradient(circle, #4b0082, #1a0033);
        border: 14px solid #ffd700;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 115px;
        color: #ffd700;
    }

    /* Left Panel */
    .left-panel {
        position: absolute;
        top: 130px;
        left: 50px;
        width: 170px;
        text-align: center;
    }

    .level { font-size: 82px; color: #ffd700; margin: 10px 0; text-shadow: 0 0 20px #8b00ff; }

    /* XP */
    .xp-area {
        position: absolute;
        top: 135px;
        right: 60px;
        width: 300px;
        text-align: right;
    }

    /* Stats + Buttons */
    .stats {
        position: absolute;
        top: 360px;
        left: 50px;
        width: 200px;
    }

    .action-buttons {
        position: absolute;
        bottom: 110px;
        left: 45px;
        display: grid;
        grid-template-columns: repeat(3, 110px);
        gap: 12px;
    }

    button {
        padding: 16px;
        font-size: 16px;
        background: #2a1a3d;
        color: #e8d4a9;
        border: 3px solid #ffd700;
        cursor: pointer;
    }

    button:hover {
        background: #4a2c0f;
        color: #ffd700;
    }

    .notifications {
        position: absolute;
        bottom: 45px;
        right: 60px;
        width: 280px;
        background: rgba(26,15,36,0.95);
        border: 4px solid #8b00ff;
        padding: 15px;
    }
</style>
</head>
<body>

<div class="hud">
    <div class="header">
        <div class="title">VELVET ORDER</div>
        <div class="subtitle">ROLE PROGRESSION HUD</div>
    </div>

    <div class="left-panel">
        <div style="color:#c79bff; font-size:18px;">ROLE<br><strong>DOMINANT</strong></div>
        <div style="color:#c79bff; font-size:18px;">RANK<br><strong>KEEPER</strong></div>
        <div class="level">12</div>
    </div>

    <div class="center-emblem">👑<br><span style="font-size:42px;">VO</span></div>

    <div class="xp-area">
        <div style="color:#ffd700; font-size:19px;">XP 4,725 / 6,000</div>
        <div style="height:28px; background:#1a0f24; border:3px solid #ffd700; margin:8px 0;">
            <div style="height:100%; width:78%; background:linear-gradient(to right, #8b00ff, #ff00ff);"></div>
        </div>
        <div style="font-size:14px; color:#b89778;">NEXT LEVEL +1,275 XP</div>
    </div>

    <div class="stats">
        <div style="margin:18px 0;">Discipline 72%</div>
        <div style="height:22px; background:#1a0f24; border:2px solid #4a2c0f;">
            <div style="width:72%; height:100%; background:linear-gradient(#8b00ff,#4b0082);"></div>
        </div>
        
        <div style="margin:18px 0;">Loyalty 65%</div>
        <div style="height:22px; background:#1a0f24; border:2px solid #4a2c0f;">
            <div style="width:65%; height:100%; background:linear-gradient(#ff3366,#aa0022);"></div>
        </div>
        
        <div style="margin:18px 0;">Control 80%</div>
        <div style="height:22px; background:#1a0f24; border:2px solid #4a2c0f;">
            <div style="width:80%; height:100%; background:linear-gradient(#00ddff,#006699);"></div>
        </div>
    </div>

    <div class="action-buttons">
        <button onclick="sendCommand('KNEEL')">KNEEL</button>
        <button onclick="sendCommand('OBEY')">OBEY</button>
        <button onclick="sendCommand('SERVE')">SERVE</button>
        <button onclick="sendCommand('PRAISE')">PRAISE</button>
        <button onclick="sendCommand('BOND')">BOND</button>
        <button onclick="sendCommand('REWARD')">REWARD</button>
    </div>

    <div class="notifications">
        <strong>NOTIFICATIONS</strong><br>
        Daily Login Bonus Claimed +100 XP
    </div>
</div>

<script>
function sendCommand(cmd) {
    window.location.href = "#" + cmd;
}
</script>
</body>
</html>
