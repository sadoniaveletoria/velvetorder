<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Velvet Order HUD</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: "Cinzel", Georgia, serif;
}

.hud-wrapper {
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
    background: #000;
}

.hud {
    position: absolute;
    width: 1240px;
    height: 1240px;
    top: 50%;
    left: 50%;
    margin-left: -620px;
    margin-top: -620px;
    transform-origin: center center;
    transform: scale(1);
    overflow: hidden;
}

.hud-bg {
    position: absolute;
    inset: 0;
    width: 1240px;
    height: 1240px;
    object-fit: cover;
    z-index: 1;
}

.hud-text {
    position: absolute;
    z-index: 5;
    pointer-events: none;
    text-shadow: 0 0 4px #000, 0 0 8px #000, 0 0 14px #000;
}

.gold-text {
    color: #d4af37;
}

.purple-text {
    color: #9b30ff;
    text-shadow: 0 0 5px #000, 0 0 10px #5a007f, 0 0 16px #000;
}

.script-text {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic;
}

/* Live text overlays */
#hudRoleLabel {
    top: 168px;
    left: 112px;
    font-size: 19px;
}

#hudRole {
    top: 150px;
    left: 85px;
    width: 135px;
    text-align: center;
    font-size: 22px;
}

#hudRankLabel {
    top: 258px;
    left: 112px;
    font-size: 19px;
}

#hudRank {
    top: 238px;
    left: 85px;
    width: 135px;
    text-align: center;
    font-size: 22px;
}

#hudLevelLabel {
    top: 339px;
    left: 112px;
    font-size: 19px;
}

#hudLevel {
    top: 315px;
    left: 80px;
    width: 140px;
    text-align: center;
    font-size: 46px;
    line-height: 1;
}

#hudXPLabel {
    top: 168px;
    left: 595px;
    font-size: 19px;
}

#hudXPText {
    top: 150px;
    left: 440px;
    width: 130px;
    text-align: center;
    font-size: 17px;
}

#hudXPFill {
    position: absolute;
    z-index: 6;
    top: 195px;
    left: 386px;
    width: 0px;
    height: 18px;
    background: linear-gradient(to right, #5f178f, #9b30ff);
    box-shadow: 0 0 10px rgba(155, 48, 255, 0.85);
    border-radius: 3px;
    pointer-events: none;
}

#hudXPPercent {
    top: 193px;
    left: 440px;
    width: 120px;
    text-align: center;
    font-size: 16px;
    color: #fff0ff;
    z-index: 7;
}

#hudNextText {
    top: 238px;
    left: 435px;
    width: 140px;
    text-align: center;
    font-size: 16px;
}

#hudPrestige {
    top: 294px;
    left: 455px;
    width: 90px;
    text-align: center;
    font-size: 34px;
}

#hudCurrentTitle {
    top: 548px;
    left: 180px;
    width: 330px;
    font-size: 28px;
}

#hudDisciplineValue {
    top: 654px;
    left: 433px;
    font-size: 20px;
}

#hudLoyaltyValue {
    top: 727px;
    left: 433px;
    font-size: 20px;
}

#hudControlValue {
    top: 800px;
    left: 433px;
    font-size: 20px;
}

#hudStatus {
    top: 817px;
    left: 565px;
    font-size: 18px;
    color: #32d65a;
}

#hudActiveTitleLabel {
    top: 1007px;
    left: 220px;
    width: 220px;
    text-align: center;
    font-size: 18px;
}

#hudActiveTitle {
    top: 785px;
    left: 95px;
    width: 255px;
    text-align: center;
    font-size: 27px;
}

#hudActiveRankLabel {
    top: 1007px;
    left: 675px;
    width: 380px;
    text-align: center;
    font-size: 18px;
}

#hudActiveRank {
    top: 785px;
    left: 430px;
    width: 185px;
    text-align: center;
    font-size: 24px;
}

#hudCurrency {
    top: 1195px;
    left: 835px;
    width: 330px;
    font-size: 22px;
}

/* Clickable hitboxes */
.hitbox {
    position: absolute;
    z-index: 20;
    background: transparent;
    border: none;
    cursor: pointer;
}

.hitbox:hover {
    outline: 2px solid rgba(155, 48, 255, 0.45);
    box-shadow: 0 0 18px rgba(155, 48, 255, 0.55);
}

.profile-hit { top: 55px; left: 765px; width: 130px; height: 130px; }
.xp-hit { top: 55px; left: 915px; width: 130px; height: 130px; }
.quest-hit { top: 55px; left: 1065px; width: 130px; height: 130px; }

.titles-hit { top: 210px; left: 765px; width: 130px; height: 130px; }
.partner-hit { top: 210px; left: 915px; width: 130px; height: 130px; }
.events-hit { top: 210px; left: 1065px; width: 130px; height: 130px; }

.house-hit { top: 365px; left: 915px; width: 130px; height: 130px; }
.settings-hit { top: 365px; left: 1065px; width: 130px; height: 130px; }

.kneel-hit { top: 858px; left: 25px; width: 90px; height: 90px; }
.obey-hit { top: 858px; left: 130px; width: 90px; height: 90px; }
.serve-hit { top: 858px; left: 230px; width: 90px; height: 90px; }
.praise-hit { top: 858px; left: 335px; width: 90px; height: 90px; }
.bond-hit { top: 858px; left: 440px; width: 90px; height: 90px; }
.reward-hit { top: 858px; left: 545px; width: 90px; height: 90px; }

.wear-hit { top: 895px; left: 660px; width: 120px; height: 55px; }
.unwear-hit { top: 895px; left: 790px; width: 135px; height: 55px; }
.lock-hit { top: 895px; left: 940px; width: 120px; height: 55px; }
.unlock-hit { top: 895px; left: 1070px; width: 145px; height: 55px; }

.close-hit { top: 1180px; left: 520px; width: 215px; height: 55px; }

/* Minimize restore button */
.restore-btn {
    display: none;
    position: absolute;
    bottom: 25px;
    right: 25px;
    width: 95px;
    height: 95px;
    border-radius: 50%;
    background: #080808;
    border: 3px solid #8c6a12;
    color: #9b30ff;
    font-family: "Cinzel", Georgia, serif;
    font-size: 32px;
    box-shadow: 0 0 25px rgba(155,48,255,0.6);
    z-index: 3000;
}

/* Popup menu */
.titles-menu {
    display: none;
    position: absolute;
    z-index: 2500;
    top: 260px;
    left: 285px;
    width: 670px;
    height: 650px;
    background:
        radial-gradient(circle at center, rgba(90, 20, 120, 0.25), transparent 55%),
        rgba(5, 5, 5, 0.98);
    border: 2px solid #8c6a12;
    box-shadow:
        0 0 35px rgba(155,48,255,0.55),
        inset 0 0 25px rgba(212,175,55,0.12);
    color: #d4af37;
    padding: 32px;
    text-align: center;
    font-family: "Cinzel", Georgia, serif;
}

.titles-menu-title {
    font-size: 42px;
    color: #9b30ff;
    margin-bottom: 18px;
    letter-spacing: 4px;
}

.titles-section {
    border: 1px solid #8c6a12;
    padding: 18px;
    margin-bottom: 18px;
}

.section-heading {
    font-size: 22px;
    margin-bottom: 12px;
}

.menu-current-title {
    font-size: 30px;
    color: #9b30ff;
}

.title-buttons,
.role-buttons {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
}

.title-buttons button,
.role-buttons button,
.menu-close {
    background: #080808;
    border: 2px solid #8c6a12;
    color: #d4af37;
    border-radius: 8px;
    min-height: 58px;
    font-family: "Cinzel", Georgia, serif;
    font-size: 16px;
    cursor: pointer;
}

.menu-close {
    width: 180px;
    height: 55px;
}

.menu-note {
    font-size: 15px;
    color: #c9aa69;
    margin-top: 10px;
}
</style>
</head>

<body>
<div class="hud-wrapper">
<div class="hud" id="hud">

    <img class="hud-bg" src="HUD_Background.png" alt="Velvet Order HUD Background">

    <!-- Live text overlays -->
    <!-- <div class="hud-text gold-text" id="hudRoleLabel">ROLE</div> -->
    <div class="hud-text purple-text" id="hudRole">LOADING</div>

    <!-- <div class="hud-text gold-text" id="hudRankLabel">RANK</div> -->
    <div class="hud-text purple-text" id="hudRank">INITIATE</div>

    <!-- <div class="hud-text gold-text" id="hudLevelLabel">LEVEL</div> -->
    <div class="hud-text purple-text" id="hudLevel">1</div>

    <!-- <div class="hud-text gold-text" id="hudXPLabel">XP</div> -->
    <div class="hud-text gold-text" id="hudXPText">0 / 250</div>
    <div id="hudXPFill"></div>
    <div class="hud-text" id="hudXPPercent">0%</div>
    <div class="hud-text gold-text" id="hudNextText">+250 XP</div>

    <div class="hud-text purple-text" id="hudPrestige">0</div>

    <div class="hud-text" id="hudStatus">STATUS: ONLINE</div>

    <div class="hud-text gold-text" id="hudActiveTitleLabel">ACTIVE TITLE</div>
    <div class="hud-text purple-text" id="hudActiveTitle">INITIATE</div>

    <!-- <div class="hud-text gold-text" id="hudActiveRankLabel">ACTIVE RANK</div> -->
    <div class="hud-text purple-text" id="hudActiveTitle">INITIATE</div>
    
    <div class="hud-text gold-text" id="hudCurrency">💎 0 &nbsp;&nbsp; ♦ 0 &nbsp;&nbsp; 🔷 0</div>

    <!-- Click hitboxes -->
    <button class="hitbox profile-hit" onclick="showNotice('Profile selected.')"></button>
    <button class="hitbox xp-hit" onclick="showNotice('XP / Level selected.')"></button>
    <button class="hitbox quest-hit" onclick="showNotice('Daily Quest selected.')"></button>

    <button class="hitbox titles-hit" onclick="openTitlesMenu()"></button>
    <button class="hitbox partner-hit" onclick="showNotice('Partner selected.')"></button>
    <button class="hitbox events-hit" onclick="showNotice('Events selected.')"></button>

    <!-- Leaderboard intentionally commented out for now -->
    <!-- <button class="hitbox leaderboard-hit"></button> -->

    <button class="hitbox house-hit" onclick="showNotice('House selected.')"></button>
    <button class="hitbox settings-hit" onclick="showNotice('Settings selected.')"></button>

    <button class="hitbox kneel-hit" onclick="showNotice('Kneel selected.')"></button>
    <button class="hitbox obey-hit" onclick="showNotice('Obey selected.')"></button>
    <button class="hitbox serve-hit" onclick="showNotice('Serve selected.')"></button>
    <button class="hitbox praise-hit" onclick="showNotice('Praise selected.')"></button>
    <button class="hitbox bond-hit" onclick="showNotice('Bond selected.')"></button>
    <button class="hitbox reward-hit" onclick="showNotice('Reward selected.')"></button>

    <button class="hitbox wear-hit" onclick="showNotice('Wear selected.')"></button>
    <button class="hitbox unwear-hit" onclick="showNotice('Unwear selected.')"></button>
    <button class="hitbox lock-hit" onclick="showNotice('Lock selected.')"></button>
    <button class="hitbox unlock-hit" onclick="showNotice('Unlock selected.')"></button>

    <button class="hitbox close-hit" onclick="minimizeHUD()"></button>

    <!-- Titles / Role popup -->
    <div class="titles-menu" id="titlesMenu">
        <div class="titles-menu-title">TITLES & ROLE</div>

        <div class="titles-section">
            <div class="section-heading">CURRENT TITLE</div>
            <div class="menu-current-title" id="menuCurrentTitle">INITIATE</div>
        </div>

        <div class="titles-section">
            <div class="section-heading">UNLOCKED TITLES</div>
            <div class="title-buttons" id="titleButtons"></div>
            <div class="menu-note">Only titles unlocked through your level appear here.</div>
        </div>

        <div class="titles-section">
            <div class="section-heading">SWITCH ROLE</div>
            <div class="role-buttons">
                <button onclick="selectRole('dominant')">DOMINANT</button>
                <button onclick="selectRole('submissive')">SUBMISSIVE</button>
                <button onclick="selectRole('switch')">SWITCH</button>
            </div>
            <div class="menu-note">Role saving should be handled by LSL using /api/user/role.</div>
        </div>

        <button class="menu-close" onclick="closeTitlesMenu()">CLOSE</button>
    </div>

    <button class="restore-btn" id="restoreBtn" onclick="restoreHUD()">VO</button>

</div>
</div>

<script>
let unlockedTitles = [];

function scaleHUD() {
    const baseSize = 1240;
    const scale = Math.min(window.innerWidth / baseSize, window.innerHeight / baseSize);
    document.querySelector(".hud").style.transform = "scale(" + scale + ")";
}

function getParam(name, fallback) {
    const params = new URLSearchParams(window.location.search);
    const value = params.get(name);
    return value === null || value === "" ? fallback : value;
}

function cleanRole(role) {
    role = (role || "loading").toLowerCase();
    if (role === "dominant") return "DOMINANT";
    if (role === "submissive") return "SUBMISSIVE";
    if (role === "switch") return "SWITCH";
    return "LOADING";
}

function buildUnlockedTitles(role, level) {
    const titleSets = {
        dominant: [
            [1, "Initiate"], [10, "Handler"], [20, "Trainer"], [30, "Keeper"],
            [40, "Owner"], [50, "Regent"], [60, "Sovereign"], [70, "High Sovereign"],
            [80, "Velvet Monarch"], [90, "Ascendant Dominant"], [100, "Eternal Sovereign"]
        ],
        submissive: [
            [1, "Initiate"], [10, "Attendant"], [20, "Pet"], [30, "Companion"],
            [40, "Service Bound"], [50, "Devoted"], [60, "Cherished"], [70, "Treasured"],
            [80, "Velvet Beloved"], [90, "Ascendant Submissive"], [100, "Eternal Devotion"]
        ],
        switch: [
            [1, "Initiate"], [10, "Curious"], [20, "Adaptive"], [30, "Dual-Bonded"],
            [40, "Harmonized"], [50, "Versatile Elite"], [60, "Ascendant"], [70, "Velvet Balanced"],
            [80, "Twin Flame"], [90, "Ascendant Switch"], [100, "Eternal Balance"]
        ]
    };

    role = (role || "switch").toLowerCase();
    const set = titleSets[role] || titleSets.switch;
    return set.filter(t => level >= t[0]).map(t => t[1]);
}

function renderTitleButtons() {
    const container = document.getElementById("titleButtons");
    container.innerHTML = "";

    unlockedTitles.forEach(title => {
        const btn = document.createElement("button");
        btn.textContent = title.toUpperCase();
        btn.onclick = function() { selectTitle(title); };
        container.appendChild(btn);
    });
}

function updateHUDFromParams() {
    const role = getParam("role", "loading");
    const rank = getParam("rank", "Initiate");
    const level = parseInt(getParam("level", "1"), 10) || 1;
    const xp = parseInt(getParam("xp", "0"), 10) || 0;
    const next = parseInt(getParam("next", "250"), 10) || 250;
    const tokens = parseInt(getParam("tokens", "0"), 10) || 0;
    const title = getParam("title", rank);
    const maxLevel = parseInt(getParam("max", "100"), 10) || 100;

    const percent =
        level >= maxLevel || next <= 0
            ? 100
            : Math.min(Math.max((xp / next) * 100, 0), 100);

    const remaining =
        level >= maxLevel || next <= 0
            ? 0
            : Math.max(next - xp, 0);

    unlockedTitles = buildUnlockedTitles(role, level);

    document.getElementById("hudRole").textContent = cleanRole(role);
    document.getElementById("hudRank").textContent = rank.toUpperCase();
    document.getElementById("hudLevel").textContent = level;

    document.getElementById("hudXPText").textContent =
        xp.toLocaleString() + " / " + next.toLocaleString();

    document.getElementById("hudXPFill").style.width =
        Math.round(percent * 1.9) + "px";

    document.getElementById("hudXPPercent").textContent =
        Math.round(percent) + "%";

    document.getElementById("hudNextText").textContent =
        level >= maxLevel ? "MAX LEVEL" : "+" + remaining.toLocaleString() + " XP";

    document.getElementById("hudCurrentTitle").textContent = rank.toUpperCase();
    document.getElementById("hudActiveTitle").textContent = title.toUpperCase();
    document.getElementById("hudActiveRank").textContent = rank.toUpperCase();
    document.getElementById("menuCurrentTitle").textContent = title.toUpperCase();

    document.getElementById("hudCurrency").innerHTML =
        "💎 " + tokens.toLocaleString() + " &nbsp;&nbsp; ♦ 0 &nbsp;&nbsp; 🔷 0";

    renderTitleButtons();
}

function showNotice(text) {
    console.log(text);
}

function openTitlesMenu() {
    document.getElementById("titlesMenu").style.display = "block";
    document.getElementById("menuCurrentTitle").textContent =
        document.getElementById("hudActiveTitle").textContent;
    renderTitleButtons();
}

function closeTitlesMenu() {
    document.getElementById("titlesMenu").style.display = "none";
}

function selectTitle(title) {
    document.getElementById("hudActiveTitle").textContent = title.toUpperCase();
    document.getElementById("menuCurrentTitle").textContent = title.toUpperCase();
    closeTitlesMenu();
}

function selectRole(role) {
    document.getElementById("hudRole").textContent = cleanRole(role);
    closeTitlesMenu();
}

function minimizeHUD() {
    document.querySelectorAll(".hud > *").forEach(function(el) {
        if (el.id !== "restoreBtn") {
            el.style.display = "none";
        }
    });
    document.getElementById("restoreBtn").style.display = "block";
}

function restoreHUD() {
    document.querySelectorAll(".hud > *").forEach(function(el) {
        if (el.id !== "restoreBtn") {
            el.style.display = "";
        }
    });
    document.getElementById("titlesMenu").style.display = "none";
    document.getElementById("restoreBtn").style.display = "none";
}

window.addEventListener("resize", scaleHUD);
window.addEventListener("load", function () {
    scaleHUD();
    updateHUDFromParams();
});
</script>

</body>
</html>
