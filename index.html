<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Velvet Order HUD</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap');

    * { box-sizing: border-box; }

    body, html {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        background: #0c0614;
        overflow: hidden;
        font-family: 'Cinzel', serif;
        opacity: 1;
    }

    .hud {
        width: 100%;
        height: 100%;
        background: linear-gradient(#1a0f24, #0c0614);
        border: 20px solid #3d2a1f;
        box-shadow: 0 0 70px #8b00ff inset, 0 0 40px #ffd700;
        position: relative;
        overflow: hidden;
    }

    .header {
        text-align: center;
        padding: 20px 0 12px;
        background: linear-gradient(#2a1a3d, #1a0f24);
        border-bottom: 6px solid #ffd700;
    }

    .title {
        font-size: 5.2vw;
        color: #ffd700;
        text-shadow: 0 0 25px #ffd700, 0 0 15px #8b00ff;
        letter-spacing: 6px;
        margin: 0;
    }

    .subtitle {
        font-size: 1.65vw;
        color: #b89778;
        margin-top: 4px;
    }

    /* Left Panel */
    .left-panel {
        position: absolute;
        top: 17%;
        left: 5%;
        width: 18%;
        text-align: center;
    }

    .role-text {
        color: #c79bff;
        font-size: 2.1vw;
        margin: 8px 0;
    }

    .level {
        font-size: 8.8vw;
        color: #ffd700;
        text-shadow: 0 0 25px #8b00ff;
        margin: 10px 0 0;
    }

    /* Center Emblem */
    .center-emblem {
        position: absolute;
        top: 12%;
        left: 50%;
        transform: translateX(-50%);
        width: 23vw;
        height: 23vw;
        max-width: 230px;
        max-height: 230px;
        background: radial-gradient(circle, #4b0082, #1a0033);
        border: 14px solid #ffd700;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11.5vw;
        color: #ffd700;
        box-shadow: 0 0 50px #ffd700;
    }

    /* XP Area */
    .xp-area {
        position: absolute;
        top: 14%;
        right: 5%;
        width: 32%;
        text-align: right;
    }

    /* Stats */
    .stats {
        position: absolute;
        top: 48%;
        left: 5%;
        width: 22%;
    }

    .stat {
        margin: 2.8vh 0;
        font-size: 1.85vw;
    }

    .stat-bar-bg {
        height: 3vh;
        background: #1a0f24;
        border: 2px solid #4a2c0f;
        margin-top: 6px;
    }

    .stat-fill {
        height: 100%;
        transition: width 0.8s ease;
    }

    /* Action Buttons */
    .action-buttons {
        position: absolute;
        bottom: 13%;
        left: 5%;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1.3vw;
    }

    button {
        padding: 2vh 1vw;
        font-size: 1.7vw;
        background: #2a1a3d;
        color: #e8d4a9;
        border: 3px solid #ffd700;
        cursor: pointer;
        transition: all 0.2s;
    }

    button:hover {
        background: #4a2c0f;
        color: #ffd700;
        box-shadow: 0 0 15px #ffd700;
    }

    /* Notifications */
    .notifications {
        position: absolute;
        bottom: 6%;
        right: 5%;
        width: 29%;
        background: rgba(26,15,36,0.95);
        border: 4px solid #8b00ff;
        padding: 16px;
        font-size: 1.55vw;
    }
</style>
</head>
<body>

<div class="hud">
    <div class="header">
        <div class="title">VELVET ORDER</div>
        <div class="subtitle">ROLE PROGRESSION HUD</div>
    </div>

    <!-- Left Panel -->
    <div class="left-panel">
        <div class="role-text">ROLE<br><strong>DOMINANT</strong></div>
        <div class="role-text">RANK<br><strong>KEEPER</strong></div>
        <div class="level">12</div>
    </div>

    <!-- Center Emblem -->
    <div class="center-emblem">👑<br><span style="font-size:4.2vw;">VO</span></div>

    <!-- XP Area -->
    <div class="xp-area">
        <div style="color:#ffd700; font-size:2.1vw;">XP 4,725 / 6,000</div>
        <div style="height:3.4vh; background:#1a0f24; border:3px solid #ffd700; margin:10px 0;">
            <div style="height:100%; width:78%; background:linear-gradient(to right, #8b00ff, #ff00ff); box-shadow: 0 0 12px #ff00ff;"></div>
        </div>
        <div style="font-size:1.45vw; color:#b89778;">NEXT LEVEL +1,275 XP</div>
    </div>

    <!-- Stats -->
    <div class="stats">
        <div class="stat">
            Discipline 72%
            <div class="stat-bar-bg"><div class="stat-fill" style="width:72%; background:linear-gradient(#8b00ff,#4b0082);"></div></div>
        </div>
        <div class="stat">
            Loyalty 65%
            <div class="stat-bar-bg"><div class="stat-fill" style="width:65%; background:linear-gradient(#ff3366,#aa0022);"></div></div>
        </div>
        <div class="stat">
            Control 80%
            <div class="stat-bar-bg"><div class="stat-fill" style="width:80%; background:linear-gradient(#00ddff,#006699);"></div></div>
        </div>
    </div>

    <!-- Action Buttons -->
    <div class="action-buttons">
        <button onclick="sendCommand('KNEEL')">KNEEL</button>
        <button onclick="sendCommand('OBEY')">OBEY</button>
        <button onclick="sendCommand('SERVE')">SERVE</button>
        <button onclick="sendCommand('PRAISE')">PRAISE</button>
        <button onclick="sendCommand('BOND')">BOND</button>
        <button onclick="sendCommand('REWARD')">REWARD</button>
    </div>

    <!-- Notifications -->
    <div class="notifications">
        <strong>NOTIFICATIONS</strong><br>
        Daily Login Bonus Claimed +100 XP
    </div>
</div>

<script>
function sendCommand(cmd) {
    // Best method for triggering Second Life commands
    window.location.href = "secondlife:///app/chat/local/" + encodeURIComponent("/" + cmd.toLowerCase());
    console.log("Command sent:", cmd);
}

// Force visible on load
window.onload = function() {
    document.body.style.opacity = "1";
};
</script>

</body>
</html>
