<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velvet Order HUD</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap');

    * {
        box-sizing: border-box;
    }

    body, html {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        background: #0c0614;
        overflow: hidden;
        font-family: 'Cinzel', serif;
    }

    .hud {
        width: 100%;
        height: 100%;
        background: linear-gradient(#1a0f24, #0c0614);
        border: 18px solid #3d2a1f;
        box-shadow: 0 0 70px #8b00ff inset, 0 0 40px #ffd700;
        position: relative;
        overflow: hidden;
    }

    .header {
        text-align: center;
        padding: 18px 0 12px;
        background: linear-gradient(#2a1a3d, #1a0f24);
        border-bottom: 6px solid #ffd700;
    }

    .title {
        font-size: 5.2vw;
        color: #ffd700;
        text-shadow: 0 0 25px #ffd700;
        letter-spacing: 6px;
        margin: 0;
        white-space: nowrap;
    }

    .subtitle {
        font-size: 1.6vw;
        color: #b89778;
    }

    .center-emblem {
        position: absolute;
        top: 12%;
        left: 50%;
        transform: translateX(-50%);
        width: 22vw;
        height: 22vw;
        max-width: 220px;
        max-height: 220px;
        background: radial-gradient(circle, #4b0082, #1a0033);
        border: 12px solid #ffd700;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11vw;
        color: #ffd700;
    }

    .left-panel {
        position: absolute;
        top: 18%;
        left: 5%;
        width: 18%;
        text-align: center;
    }

    .level {
        font-size: 8.5vw;
        color: #ffd700;
        text-shadow: 0 0 20px #8b00ff;
        margin: 10px 0;
    }

    .xp-area {
        position: absolute;
        top: 15%;
        right: 5%;
        width: 32%;
        text-align: right;
    }

    .stats {
        position: absolute;
        top: 48%;
        left: 5%;
        width: 22%;
    }

    .action-buttons {
        position: absolute;
        bottom: 14%;
        left: 5%;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1.2vw;
    }

    button {
        padding: 1.8vh 1vw;
        font-size: 1.6vw;
        background: #2a1a3d;
        color: #e8d4a9;
        border: 3px solid #ffd700;
        cursor: pointer;
        min-height: 6vh;
    }

    button:hover {
        background: #4a2c0f;
        color: #ffd700;
    }

    .notifications {
        position: absolute;
        bottom: 6%;
        right: 5%;
        width: 28%;
        background: rgba(26,15,36,0.95);
        border: 4px solid #8b00ff;
        padding: 15px;
        font-size: 1.5vw;
    }
</style>
</head>
<body>

<div class="hud">
    <div class="header">
        <div class="title">VELVET ORDER</div>
        <div class="subtitle">ROLE PROGRESSION HUD</div>
    </div>

    <div class="left-panel">
        <div style="color:#c79bff; font-size:2.1vw;">ROLE<br><strong>DOMINANT</strong></div>
        <div style="color:#c79bff; font-size:2.1vw;">RANK<br><strong>KEEPER</strong></div>
        <div class="level">12</div>
    </div>

    <div class="center-emblem">👑<br><span style="font-size:4vw;">VO</span></div>

    <div class="xp-area">
        <div style="color:#ffd700; font-size:2vw;">XP 4,725 / 6,000</div>
        <div style="height:3.2vh; background:#1a0f24; border:3px solid #ffd700; margin:8px 0;">
            <div style="height:100%; width:78%; background:linear-gradient(to right, #8b00ff, #ff00ff);"></div>
        </div>
        <div style="font-size:1.4vw; color:#b89778;">NEXT LEVEL +1,275 XP</div>
    </div>

    <div class="stats">
        <div style="margin:2.5vh 0; font-size:1.8vw;">Discipline 72%</div>
        <div style="height:2.8vh; background:#1a0f24; border:2px solid #4a2c0f;">
            <div style="width:72%; height:100%; background:linear-gradient(#8b00ff,#4b0082);"></div>
        </div>
        
        <div style="margin:2.5vh 0; font-size:1.8vw;">Loyalty 65%</div>
        <div style="height:2.8vh; background:#1a0f24; border:2px solid #4a2c0f;">
            <div style="width:65%; height:100%; background:linear-gradient(#ff3366,#aa0022);"></div>
        </div>
        
        <div style="margin:2.5vh 0; font-size:1.8vw;">Control 80%</div>
        <div style="height:2.8vh; background:#1a0f24; border:2px solid #4a2c0f;">
            <div style="width:80%; height:100%; background:linear-gradient(#00ddff,#006699);"></div>
        </div>
    </div>

    <div class="action-buttons">
        <button onclick="sendCommand('KNEEL')">KNEEL</button>
        <button onclick="sendCommand('OBEY')">OBEY</button>
        <button onclick="sendCommand('SERVE')">SERVE</button>
        <button onclick="sendCommand('PRAISE')">PRAISE</button>
        <button onclick="sendCommand('BOND')">BOND</button>
        <button onclick="sendCommand('REWARD')">REWARD</button>
    </div>

    <div class="notifications">
        <strong>NOTIFICATIONS</strong><br>
        Daily Login Bonus Claimed +100 XP
    </div>
</div>

<script>
function sendCommand(cmd) {
    window.location.href = "#" + cmd;
}
</script>
</body>
</html>
