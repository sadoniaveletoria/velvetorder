<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Velvet Order HUD</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: "Cinzel", Georgia, serif;
}

.hud-wrapper {
    width: 100vw;
    height: 100vh;
    background: #000;
    overflow: hidden;
    position: relative;
}

.hud {
    position: absolute;
    width: 1240px;
    height: 1240px;
    top: 50%;
    left: 50%;
    margin-left: -620px;
    margin-top: -620px;
    transform: scale(1);
    transform-origin: center center;
    background:
        radial-gradient(circle at center, rgba(120, 25, 170, 0.18), transparent 36%),
        linear-gradient(145deg, #050307, #0b0710 45%, #030203);
    border: 3px solid #8c6a12;
    box-shadow:
        inset 0 0 70px rgba(155, 48, 255, 0.16),
        inset 0 0 30px rgba(212, 175, 55, 0.18),
        0 0 35px rgba(0,0,0,0.9);
    color: #d4af37;
    overflow: hidden;
}

.panel {
    position: absolute;
    background:
        linear-gradient(180deg, rgba(20,14,22,0.96), rgba(3,3,5,0.96));
    border: 2px solid #8c6a12;
    border-radius: 16px;
    box-shadow:
        inset 0 0 25px rgba(0,0,0,0.9),
        inset 0 0 18px rgba(155,48,255,0.08),
        0 0 12px rgba(212,175,55,0.12);
}

.panel::before {
    content: "";
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(212,175,55,0.28);
    border-radius: 12px;
    pointer-events: none;
}

.gold {
    background: linear-gradient(to bottom, #fff4b8 0%, #d4af37 45%, #7c5416 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.purple {
    background: linear-gradient(to bottom, #f0b8ff 0%, #a735ff 45%, #4d0872 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.shadow {
    text-shadow: 0 0 4px #000, 0 0 10px #000;
}

/* TOP PROFILE */
.profile-panel {
    left: 20px;
    top: 20px;
    width: 710px;
    height: 455px;
}

.main-title {
    position: absolute;
    top: 36px;
    width: 100%;
    text-align: center;
    font-size: 66px;
    letter-spacing: 7px;
    font-weight: 700;

    background: linear-gradient(
        to bottom,
        #fffbe0 0%,
        #ffe89a 20%,
        #f4d86a 40%,
        #d4af37 60%,
        #b8860b 80%,
        #f7df78 100%
    );

    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    text-shadow:
        0 1px 1px rgba(0,0,0,0.6),
        0 2px 3px rgba(0,0,0,0.45);
}

.subtitle {
    position: absolute;
    top: 114px;
    width: 100%;
    text-align: center;
    font-size: 22px;
    letter-spacing: 3px;
    font-weight: 600;
    opacity: 0.95;
}

.info-block {
    position: absolute;
    left: 58px;
    width: 190px;
}

.info-label {
    font-size: 20px;
    letter-spacing: 2px;
}

.info-value {
    margin-top: 4px;
    font-size: 30px;
    letter-spacing: 1px;
}

.role-block { top: 165px; }
.rank-block { top: 255px; }
.level-block { top: 345px; }

#hudLevel {
    font-size: 60px;
    line-height: 0.9;
}

.center-logo {
    position: absolute;
    top: 150px;
    left: 278px;
    width: 190px;
    height: 190px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.center-logo img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter:
        drop-shadow(0 0 16px rgba(212,175,55,0.85))
        drop-shadow(0 0 26px rgba(155,48,255,0.45));
}

.xp-area {
    position: absolute;
    top: 158px;
    right: 40px;
    width: 185px;
    text-align: center;
}

.xp-label {
    font-size: 22px;
    letter-spacing: 2px;
}

.xp-number {
    margin-top: 8px;
    font-size: 20px;
}

.xp-bar {
    position: relative;
    margin-top: 12px;
    width: 185px;
    height: 30px;
    border: 2px solid #8c6a12;
    background: #050406;
    clip-path: polygon(8% 0%, 92% 0%, 100% 50%, 92% 100%, 8% 100%, 0% 50%);
    overflow: hidden;
}

.xp-fill {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #5b087d, #a735ff, #ec8bff);
    box-shadow: 0 0 18px rgba(167,53,255,0.9);
}

.xp-percent {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff0ff;
    font-size: 16px;
    z-index: 2;
}

.next-xp {
    margin-top: 16px;
    font-size: 17px;
    line-height: 1.4;
}

.prestige {
    position: absolute;
    right: 74px;
    top: 330px;
    text-align: center;
    font-size: 18px;
}

#hudPrestige {
    font-size: 42px;
}

.motto {
    position: absolute;
    bottom: 35px;
    width: 100%;
    text-align: center;
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-size: 30px;
}

/* MENU GRID */
.menu-panel {
    top: 20px;
    right: 20px;
    width: 475px;
    height: 455px;
    padding: 28px;
}

.menu-grid {
    display: grid;
    grid-template-columns: repeat(2, 190px);
    grid-template-rows: repeat(3, 115px);
    gap: 18px;
    justify-content: center;
}

.menu-btn {
    background:
        linear-gradient(180deg, rgba(19,16,18,0.95), rgba(5,5,7,0.95));
    border: 2px solid #8c6a12;
    border-radius: 12px;
    color: #d4af37;
    font-family: "Cinzel", serif;
    font-size: 16px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.18s ease;
    box-shadow: inset 0 0 14px rgba(0,0,0,0.85);
}

.menu-btn:hover {
    color: #fff1b0;
    border-color: #f0c95a;
    transform: translateY(-2px);
    box-shadow:
        0 0 18px rgba(155,48,255,0.55),
        inset 0 0 20px rgba(212,175,55,0.12);
}

.menu-icon {
    display: block;
    font-size: 42px;
    margin-bottom: 10px;
}

/* MIDDLE */
.large-panel {
    left: 20px;
    top: 500px;
    width: 470px;
    height: 275px;
}

.feature-title {
    position: absolute;
    top: 24px;
    width: 100%;
    text-align: center;
    font-size: 22px;
    letter-spacing: 2px;
}

.medallion {
    position: absolute;
    top: 515px;
    left: 505px;
    width: 260px;
    height: 260px;
    border-radius: 50%;
    border: none;
    background: transparent;
    box-shadow: none;
    display: flex;
    align-items: center;
    justify-content: center;
}

.medallion img {
    width: 75%;
    height: 75%;
    object-fit: contain;
    filter:
        drop-shadow(0 0 18px rgba(212,175,55,0.8))
        drop-shadow(0 0 28px rgba(155,48,255,0.5));
}

.status-pill {
    position: absolute;
    top: 800px;
    left: 535px;
    width: 200px;
    height: 42px;
    border: 2px solid #8c6a12;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #31d75b;
    font-size: 16px;
    background: #050406;
}

.notifications-panel {
    top: 500px;
    right: 20px;
    width: 470px;
    height: 275px;
    padding: 28px;
}

.notifications-title {
    text-align: center;
    font-size: 24px;
    letter-spacing: 2px;
}

.notifications-body {
    margin-top: 34px;
    font-size: 18px;
    line-height: 1.5;
    color: #c9aa69;
    text-align: center;
}

/* ACTIONS */
.action-row {
    position: absolute;
    top: 800px;
    left: 20px;
    display: grid;
    grid-template-columns: repeat(6, 82px);
    gap: 10px;
}

.action-btn {
    height: 72px;
    background: linear-gradient(180deg, #120f14, #050406);
    border: 2px solid #8c6a12;
    border-radius: 9px;
    color: #d4af37;
    font-family: "Cinzel", serif;
    font-size: 11px;
    letter-spacing: 0.8px;
    cursor: pointer;
    transition: all 0.18s ease;
    padding: 4px;
    white-space: nowrap;
}

.action-btn:hover {
    color: #fff1b0;
    border-color: #f0c95a;
    box-shadow: 0 0 16px rgba(155,48,255,0.5);
    transform: translateY(-2px);
}

.action-btn .icon {
    font-size: 28px;
    margin-bottom: 6px;
}
    
.wear-row {
    position: absolute;
    top: 800px;
    right: 40px;
    width: 430px;
    display: grid;
    grid-template-columns: repeat(4, 100px);
    gap: 10px;
    justify-content: center;
}

.wear-btn {
    height: 58px;
    background: linear-gradient(180deg, #120f14, #050406);
    border: 2px solid #8c6a12;
    border-radius: 10px;
    color: #d4af37;
    font-family: "Cinzel", serif;
    font-size: 13px;
    letter-spacing: 0.8px;
    cursor: pointer;
    transition: all 0.18s ease;
    white-space: nowrap;
}

.wear-btn:hover {
    color: #fff1b0;
    border-color: #f0c95a;
    box-shadow: 0 0 16px rgba(155,48,255,0.5);
    transform: translateY(-2px);
}

.wear-btn .icon {
    font-size: 18px;
}
    
/* BOTTOM PANELS */
.active-title-panel {
    left: 20px;
    top: 920px;
    width: 520px;
    height: 190px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.active-rank-panel {
    right: 20px;
    top: 920px;
    width: 670px;
    height: 190px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.panel-label {
    font-size: 22px;
    letter-spacing: 3px;
    margin-bottom: 20px;
}

.panel-value {
    font-size: 38px;
    letter-spacing: 3px;
    text-align: center;
}

.footer-left {
    position: absolute;
    bottom: 20px;
    left: 20px;
    width: 460px;
    height: 60px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
}

.footer-btn {
    background: #050406;
    border: 2px solid #8c6a12;
    border-radius: 8px;
    color: #d4af37;
    font-size: 24px;
}

.close-btn {
    position: absolute;
    bottom: 20px;
    left: 520px;
    width: 220px;
    height: 60px;
    background: #050406;
    border: 2px solid #8c6a12;
    border-radius: 10px;
    font-family: "Cinzel", serif;
    font-size: 20px;
    color: #d4af37;
    cursor: pointer;
}

.currency {
    position: absolute;
    bottom: 20px;
    right: 20px;
    width: 455px;
    height: 60px;
    border: 2px solid #8c6a12;
    border-radius: 10px;
    background: #050406;
    display: flex;
    align-items: center;
    justify-content: space-around;
    font-size: 22px;
}

/* POPUP */
.titles-menu {
    display: none;
    position: absolute;
    top: 245px;
    left: 285px;
    width: 670px;
    height: 660px;
    z-index: 5000;
    background: rgba(4, 4, 6, 0.98);
    border: 2px solid #8c6a12;
    border-radius: 16px;
    box-shadow: 0 0 35px rgba(155,48,255,0.55);
    padding: 35px;
    text-align: center;
}

.titles-menu-title {
    font-size: 42px;
    letter-spacing: 4px;
    margin-bottom: 22px;
}

.titles-section {
    border: 1px solid #8c6a12;
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 18px;
}

.title-buttons,
.role-buttons {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
}

.title-buttons button,
.role-buttons button,
.menu-close {
    background: #080808;
    border: 2px solid #8c6a12;
    color: #d4af37;
    border-radius: 8px;
    min-height: 58px;
    font-family: "Cinzel", serif;
    font-size: 16px;
    cursor: pointer;
}

.restore-btn {
    display: none;
    position: absolute;
    bottom: 25px;
    right: 25px;
    width: 95px;
    height: 95px;
    border-radius: 50%;
    background: #080808;
    border: 3px solid #8c6a12;
    color: #9b30ff;
    font-family: "Cinzel", serif;
    font-size: 32px;
    z-index: 6000;
}
</style>
</head>

<body>
<div class="hud-wrapper">
<div class="hud" id="hud">

    <section class="panel menu-panel">
        <div class="menu-grid">
            <!--<button class="menu-btn"><span class="menu-icon">👤</span>PROFILE</button>
            <button class="menu-btn"><span class="menu-icon">📈</span>XP / LEVEL</button>
            <button class="menu-btn"><span class="menu-icon">📜</span>DAILY QUEST</button>-->

    -->

<script>
let unlockedTitles = [];

function scaleHUD() {
    const scale = Math.min(window.innerWidth / 1240, window.innerHeight / 1240);
    document.querySelector(".hud").style.transform = "scale(" + scale + ")";
}

function getParam(name, fallback) {
    const params = new URLSearchParams(window.location.search);
    return params.get(name) || fallback;
}

function cleanRole(role) {
    role = (role || "loading").toLowerCase();
    if (role === "dominant") return "DOMINANT";
    if (role === "submissive") return "SUBMISSIVE";
    if (role === "switch") return "SWITCH";
    return "LOADING";
}

function buildUnlockedTitles(role, level) {
    const sets = {
        dominant: [[1,"Initiate"],[10,"Handler"],[20,"Trainer"],[30,"Keeper"],[40,"Owner"],[50,"Regent"],[60,"Sovereign"],[70,"High Sovereign"],[80,"Velvet Monarch"],[90,"Ascendant Dominant"],[100,"Eternal Sovereign"]],
        submissive: [[1,"Initiate"],[10,"Attendant"],[20,"Pet"],[30,"Companion"],[40,"Service Bound"],[50,"Devoted"],[60,"Cherished"],[70,"Treasured"],[80,"Velvet Beloved"],[90,"Ascendant Submissive"],[100,"Eternal Devotion"]],
        switch: [[1,"Initiate"],[10,"Curious"],[20,"Adaptive"],[30,"Dual-Bonded"],[40,"Harmonized"],[50,"Versatile Elite"],[60,"Ascendant"],[70,"Velvet Balanced"],[80,"Twin Flame"],[90,"Ascendant Switch"],[100,"Eternal Balance"]]
    };
    const set = sets[(role || "switch").toLowerCase()] || sets.switch;
    return set.filter(t => level >= t[0]).map(t => t[1]);
}

function renderTitleButtons() {
    const box = document.getElementById("titleButtons");
    box.innerHTML = "";
    unlockedTitles.forEach(title => {
        const btn = document.createElement("button");
        btn.textContent = title.toUpperCase();
        btn.onclick = () => selectTitle(title);
        box.appendChild(btn);
    });
}

function updateHUDFromParams() {
    const role = getParam("role", "loading");
    const rank = getParam("rank", "Initiate");
    const level = parseInt(getParam("level", "1")) || 1;
    const xp = parseInt(getParam("xp", "0")) || 0;
    const next = parseInt(getParam("next", "250")) || 250;
    const title = getParam("title", rank);
    const tokens = parseInt(getParam("tokens", "0")) || 0;
    const max = parseInt(getParam("max", "100")) || 100;
    const notice = getParam("notice", "");
    document.getElementById("hudNotifications").innerHTML = notice
    ? notice.replaceAll("|", "<br>")
    : "";

    const percent = level >= max ? 100 : Math.min((xp / next) * 100, 100);
    const remaining = level >= max ? 0 : Math.max(next - xp, 0);

    unlockedTitles = buildUnlockedTitles(role, level);

    document.getElementById("hudRole").textContent = cleanRole(role);
    document.getElementById("hudRank").textContent = rank.toUpperCase();
    document.getElementById("hudLevel").textContent = level;
    document.getElementById("hudXPText").textContent = xp.toLocaleString() + " / " + next.toLocaleString();
    document.getElementById("hudXPFill").style.width = percent + "%";
    document.getElementById("hudXPPercent").textContent = Math.round(percent) + "%";
    document.getElementById("hudNextText").textContent = level >= max ? "MAX LEVEL" : "+" + remaining.toLocaleString() + " XP";
    document.getElementById("hudActiveTitle").textContent = title.toUpperCase();
    document.getElementById("hudActiveRank").textContent = rank.toUpperCase();
    document.getElementById("menuCurrentTitle").textContent = title.toUpperCase();
    document.getElementById("hudCurrency").innerHTML = `<span>💎 ${tokens.toLocaleString()}</span><span>♦ 0</span><span>🔷 0</span>`;

    renderTitleButtons();
}

function openTitlesMenu() {
    document.getElementById("titlesMenu").style.display = "block";
    renderTitleButtons();
}

function closeTitlesMenu() {
    document.getElementById("titlesMenu").style.display = "none";
}

function selectTitle(title) {
    document.getElementById("hudActiveTitle").textContent = title.toUpperCase();
    document.getElementById("menuCurrentTitle").textContent = title.toUpperCase();
    closeTitlesMenu();
}

function selectRole(role) {
    document.getElementById("hudRole").textContent = cleanRole(role);
    closeTitlesMenu();
}

function minimizeHUD() {
    if (window.location.href.indexOf("secondlife://") !== -1) {
        window.location.href = "secondlife:///app/objectim/" + "close";
    }

    document.querySelectorAll(".hud > *").forEach(el => {
        if (el.id !== "restoreBtn") {
            el.style.display = "none";
        }
    });

    document.getElementById("restoreBtn").style.display = "block";

    // Notify LSL script in the HUD prim
    if (window.location.protocol === "secondlife:" || window.location.href.indexOf("secondlife") !== -1) {
        console.log("MINIMIZE_HUD");
    }
}

function restoreHUD() {
    document.querySelectorAll(".hud > *").forEach(el => {
        if (el.id !== "restoreBtn") el.style.display = "";
    });
    document.getElementById("titlesMenu").style.display = "none";
    document.getElementById("restoreBtn").style.display = "none";
}

window.addEventListener("resize", scaleHUD);
window.addEventListener("load", () => {
    scaleHUD();
    updateHUDFromParams();
});
</script>

</body>
</html>
