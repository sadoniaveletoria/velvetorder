<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Velvet Order HUD</title>

<style>
* {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    background: #0c0614;
    overflow: hidden;
    font-family: Georgia, "Times New Roman", serif;
    opacity: 1;
    display: block;
}

.hud {
    width: 100vw;
    height: 100vh;
    background: linear-gradient(#1a0f24, #0c0614);
    border: 20px solid #3d2a1f;
    box-shadow: 0 0 70px #8b00ff inset, 0 0 40px #ffd700;
    position: relative;
    overflow: hidden;
    transform: translateZ(0);
}

.header {
    text-align: center;
    padding: 20px 0 12px;
    background: linear-gradient(#2a1a3d, #1a0f24);
    border-bottom: 6px solid #ffd700;
}

.title {
    font-size: 5.2vw;
    color: #ffd700;
    text-shadow: 0 0 25px #ffd700, 0 0 15px #8b00ff;
    letter-spacing: 6px;
    margin: 0;
}

.subtitle {
    font-size: 1.65vw;
    color: #b89778;
    margin-top: 4px;
}

.left-panel {
    position: absolute;
    top: 17%;
    left: 5%;
    width: 18%;
    text-align: center;
}

.role-text {
    color: #c79bff;
    font-size: 2.1vw;
    margin: 8px 0;
}

.level {
    font-size: 8.8vw;
    color: #ffd700;
    text-shadow: 0 0 25px #8b00ff;
    margin: 10px 0 0;
}

.center-emblem {
    position: absolute;
    top: 12%;
    left: 50%;
    transform: translateX(-50%) translateZ(0);
    width: 23vw;
    height: 23vw;
    max-width: 230px;
    max-height: 230px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.center-emblem img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.8))
            drop-shadow(0 0 35px rgba(139, 0, 255, 0.5));
}

.xp-area {
    position: absolute;
    top: 14%;
    right: 5%;
    width: 32%;
    text-align: right;
}

.xp-text {
    color: #ffd700;
    font-size: 2.1vw;
}

.xp-bar-bg {
    height: 3.4vh;
    background: #1a0f24;
    border: 3px solid #ffd700;
    margin: 10px 0;
}

.xp-bar-fill {
    height: 100%;
    width: 78%;
    background: linear-gradient(to right, #8b00ff, #ff00ff);
    box-shadow: 0 0 12px #ff00ff;
}

.next-level {
    font-size: 1.45vw;
    color: #b89778;
}

.stats {
    position: absolute;
    top: 48%;
    left: 5%;
    width: 22%;
}

.stat {
    margin: 2.8vh 0;
    font-size: 1.85vw;
    color: #e8d4a9;
}

.stat-bar-bg {
    height: 3vh;
    background: #1a0f24;
    border: 2px solid #4a2c0f;
    margin-top: 6px;
}

.stat-fill {
    height: 100%;
    transition: width 0.8s ease;
}

.discipline {
    width: 72%;
    background: linear-gradient(#8b00ff, #4b0082);
}

.loyalty {
    width: 65%;
    background: linear-gradient(#ff3366, #aa0022);
}

.control {
    width: 80%;
    background: linear-gradient(#00ddff, #006699);
}

.action-buttons {
    position: absolute;
    bottom: 13%;
    left: 5%;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.3vw;
}

button {
    padding: 2vh 1vw;
    font-size: 1.7vw;
    background: #2a1a3d;
    color: #e8d4a9;
    border: 3px solid #ffd700;
    cursor: pointer;
    transition: all 0.2s;
    font-family: Georgia, "Times New Roman", serif;
}

button:hover {
    background: #4a2c0f;
    color: #ffd700;
    box-shadow: 0 0 15px #ffd700;
}

.notifications {
    position: absolute;
    bottom: 6%;
    right: 5%;
    width: 29%;
    background: rgba(26, 15, 36, 0.95);
    border: 4px solid #8b00ff;
    padding: 16px;
    font-size: 1.55vw;
    color: #e8d4a9;
}
</style>
</head>

<body>

<div class="hud">
    <div class="header">
        <div class="title">VELVET ORDER</div>
        <div class="subtitle">ROLE PROGRESSION HUD</div>
    </div>

    <div class="left-panel">
        <div class="role-text">ROLE<br><strong>DOMINANT</strong></div>
        <div class="role-text">RANK<br><strong>KEEPER</strong></div>
        <div class="level">12</div>
    </div>

    <div class="center-emblem">
        <img src="VO_Crown_Logo.png" alt="Velvet Order Crown Logo">
    </div>

    <div class="xp-area">
        <div class="xp-text">XP 4,725 / 6,000</div>
        <div class="xp-bar-bg">
            <div class="xp-bar-fill"></div>
        </div>
        <div class="next-level">NEXT LEVEL +1,275 XP</div>
    </div>

    <div class="stats">
        <div class="stat">
            Discipline 72%
            <div class="stat-bar-bg">
                <div class="stat-fill discipline"></div>
            </div>
        </div>

        <div class="stat">
            Loyalty 65%
            <div class="stat-bar-bg">
                <div class="stat-fill loyalty"></div>
            </div>
        </div>

        <div class="stat">
            Control 80%
            <div class="stat-bar-bg">
                <div class="stat-fill control"></div>
            </div>
        </div>
    </div>

    <div class="action-buttons">
        <button onclick="sendCommand('KNEEL')">KNEEL</button>
        <button onclick="sendCommand('OBEY')">OBEY</button>
        <button onclick="sendCommand('SERVE')">SERVE</button>
        <button onclick="sendCommand('PRAISE')">PRAISE</button>
        <button onclick="sendCommand('BOND')">BOND</button>
        <button onclick="sendCommand('REWARD')">REWARD</button>
    </div>

    <div class="notifications" id="notifications">
        <strong>NOTIFICATIONS</strong><br>
        HUD loaded successfully.
    </div>
</div>

<script>
function sendCommand(cmd) {
    const note = document.getElementById("notifications");
    note.innerHTML =
        "<strong>NOTIFICATIONS</strong><br>" +
        "Command clicked: " + cmd;
    console.log("Command clicked:", cmd);
}

document.addEventListener("DOMContentLoaded", function () {
    document.body.style.opacity = "1";
    document.body.style.display = "block";

    setTimeout(function () {
        document.body.style.transform = "translateZ(0)";
        document.querySelector(".hud").style.transform = "translateZ(0)";
    }, 250);
});
</script>

</body>
</html>
