<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velvet Order — Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: #050307;
    color: #c9aa69;
    font-family: "Cormorant Garamond", serif;
    min-height: 100vh;
    padding: 40px 20px 60px;
}

.page-header {
    text-align: center;
    margin-bottom: 50px;
}

.page-title {
    font-family: "Cinzel", serif;
    font-size: 42px;
    font-weight: 700;
    letter-spacing: 8px;
    background: linear-gradient(to bottom, #fff8d0 0%, #d4af37 50%, #8c6a12 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
    margin-bottom: 8px;
}

.page-subtitle {
    font-size: 18px;
    letter-spacing: 4px;
    color: #8c6a12;
    text-transform: uppercase;
}

.divider {
    width: 300px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #d4af37, transparent);
    margin: 20px auto;
}

.section {
    max-width: 900px;
    margin: 0 auto 50px;
}

.section-title {
    font-family: "Cinzel", serif;
    font-size: 22px;
    letter-spacing: 5px;
    text-align: center;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(140,106,18,0.3);
}

.section-title.dominant  { color: #d4af37; }
.section-title.submissive { color: #c084fc; }
.section-title.switch    { color: #7dd3fc; }
.section-title.bonds     { color: #f9a8d4; }

.leaderboard-table {
    width: 100%;
    border-collapse: collapse;
}

.leaderboard-table th {
    font-family: "Cinzel", serif;
    font-size: 11px;
    letter-spacing: 2px;
    color: #8c6a12;
    text-align: left;
    padding: 8px 14px;
    border-bottom: 1px solid rgba(140,106,18,0.2);
}

.leaderboard-table td {
    padding: 12px 14px;
    border-bottom: 1px solid rgba(140,106,18,0.08);
    font-size: 17px;
    vertical-align: middle;
}

.leaderboard-table tr:hover td {
    background: rgba(155,48,255,0.04);
}

.rank-cell {
    width: 48px;
    font-family: "Cinzel", serif;
    font-size: 14px;
    color: #8c6a12;
    text-align: center;
}

.rank-1 { color: #ffd700; font-size: 18px; }
.rank-2 { color: #c0c0c0; }
.rank-3 { color: #cd7f32; }

.name-cell {
    font-family: "Cinzel", serif;
    font-size: 16px;
    color: #f0e6cc;
    letter-spacing: 1px;
}

.title-cell {
    font-size: 14px;
    color: #a78bfa;
    letter-spacing: 1px;
}

.level-cell {
    font-family: "Cinzel", serif;
    font-size: 18px;
    color: #d4af37;
    text-align: right;
    white-space: nowrap;
}

.bond-pair {
    font-family: "Cinzel", serif;
    font-size: 15px;
    color: #f0e6cc;
    letter-spacing: 1px;
}

.bond-heart {
    color: #f9a8d4;
    margin: 0 8px;
    font-size: 18px;
}

.loading {
    text-align: center;
    padding: 40px;
    font-size: 18px;
    letter-spacing: 3px;
    color: #8c6a12;
}

.error {
    text-align: center;
    padding: 40px;
    color: #ef4444;
    font-size: 16px;
}

.updated {
    text-align: center;
    font-size: 13px;
    color: #4a3728;
    letter-spacing: 2px;
    margin-top: -30px;
    margin-bottom: 40px;
}

.refresh-btn {
    display: block;
    margin: 0 auto 40px;
    background: transparent;
    border: 1px solid #8c6a12;
    color: #d4af37;
    font-family: "Cinzel", serif;
    font-size: 13px;
    letter-spacing: 3px;
    padding: 10px 28px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
}

.refresh-btn:hover {
    border-color: #d4af37;
    box-shadow: 0 0 12px rgba(212,175,55,0.2);
}
</style>
</head>
<body>

<div class="page-header">
    <div class="page-title">VELVET ORDER</div>
    <div class="divider"></div>
    <div class="page-subtitle">Leaderboard</div>
</div>

<div class="updated" id="updatedAt">Loading...</div>
<button class="refresh-btn" onclick="loadLeaderboard()">↻ REFRESH</button>

<div id="content"><div class="loading">LOADING LEADERBOARD...</div></div>

<script>
const API_BASE   = "https://api.velvetorder.duckdns.org";
const API_SECRET = "jSDGBnYYqy08Hk4afpELPmzRkJTlfApR";

function rankIcon(i) {
    if (i === 0) return '<span class="rank-1">♛</span>';
    if (i === 1) return '<span class="rank-2">♜</span>';
    if (i === 2) return '<span class="rank-3">♝</span>';
    return '<span class="rank-cell">' + (i + 1) + '</span>';
}

function buildRoleTable(rows) {
    if (!rows || rows.length === 0)
        return '<div class="loading" style="padding:20px;">No entries yet.</div>';

    let html = '<table class="leaderboard-table">';
    html += '<tr><th>#</th><th>NAME</th><th>TITLE</th><th style="text-align:right">LEVEL</th></tr>';
    rows.forEach((r, i) => {
        html += `<tr>
            <td class="rank-cell">${rankIcon(i)}</td>
            <td class="name-cell">${r.sl_name || "Unknown"}</td>
            <td class="title-cell">${r.title || ""}</td>
            <td class="level-cell">${r.level}</td>
        </tr>`;
    });
    html += '</table>';
    return html;
}

function buildBondTable(rows) {
    if (!rows || rows.length === 0)
        return '<div class="loading" style="padding:20px;">No bonded pairs yet.</div>';

    let html = '<table class="leaderboard-table">';
    html += '<tr><th>#</th><th>BONDED PAIR</th><th style="text-align:right">BOND LEVEL</th></tr>';
    rows.forEach((r, i) => {
        html += `<tr>
            <td class="rank-cell">${rankIcon(i)}</td>
            <td><span class="bond-pair">${r.user_a_name || "Unknown"}<span class="bond-heart">♥</span>${r.user_b_name || "Unknown"}</span></td>
            <td class="level-cell">${r.bond_level}</td>
        </tr>`;
    });
    html += '</table>';
    return html;
}

async function loadLeaderboard() {
    document.getElementById("content").innerHTML = '<div class="loading">LOADING LEADERBOARD...</div>';
    document.getElementById("updatedAt").textContent = "Loading...";

    try {
        const res = await fetch(`${API_BASE}/api/leaderboard`, {
            headers: { "x-api-secret": API_SECRET }
        });

        if (!res.ok) throw new Error("Server returned " + res.status);
        const data = await res.json();

        let html = "";

        html += '<div class="section">';
        html += '<div class="section-title dominant">⚜ DOMINANT</div>';
        html += buildRoleTable(data.dominant);
        html += '</div>';

        html += '<div class="section">';
        html += '<div class="section-title submissive">♦ SUBMISSIVE</div>';
        html += buildRoleTable(data.submissive);
        html += '</div>';

        html += '<div class="section">';
        html += '<div class="section-title switch">◈ SWITCH</div>';
        html += buildRoleTable(data.switch);
        html += '</div>';

        html += '<div class="section">';
        html += '<div class="section-title bonds">♥ HIGHEST BOND PARTNERS</div>';
        html += buildBondTable(data.bonds);
        html += '</div>';

        document.getElementById("content").innerHTML = html;
        document.getElementById("updatedAt").textContent =
            "Updated " + new Date().toLocaleTimeString();

    } catch(err) {
        document.getElementById("content").innerHTML =
            '<div class="error">Failed to load leaderboard: ' + err.message + '</div>';
        document.getElementById("updatedAt").textContent = "";
    }
}

loadLeaderboard();
</script>
</body>
</html>
